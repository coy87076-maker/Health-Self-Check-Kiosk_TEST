<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Self-Check Kiosk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="kiosk-header">
    <div>
      <h1>Health Self-Check Kiosk</h1>
      <p>BMI assessment &amp; health category screening</p>
    </div>
    <div class="header-badge">Free · Confidential</div>
  </div>

  <!-- Form card -->
  <div class="card">
    <div class="card-title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Your information
    </div>

    <form id="bmiForm">
      <div class="form-grid">
        <div class="field full">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="e.g. Juan dela Cruz" required>
        </div>
        <div class="field">
          <label for="age">Age</label>
          <input type="number" id="age" min="1" max="120" placeholder="e.g. 25" required>
        </div>
        <div class="field">
          <label for="sex">Sex</label>
          <select id="sex" required>
            <option value="">Select</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
          </select>
        </div>
        <div class="field">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" min="1" placeholder="e.g. 65" required>
        </div>
        <div class="field">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" min="1" placeholder="e.g. 170" required>
        </div>
      </div>
      <button type="submit" class="btn-submit">Check My BMI</button>
      <div class="status-msg" id="statusMsg"></div>
    </form>
  </div>

  <!-- Hidden form for sheet sync -->
  <form id="sheetForm" style="display:none">
    <input name="name">
    <input name="age">
    <input name="sex">
    <input name="weight">
    <input name="heightCm">
    <input name="bmi">
    <input name="category">
  </form>

  <!-- Result card -->
  <div class="result-card" id="resultCard">
    <div class="result-banner" id="resultBanner">
      <div>
        <h2 id="resultName"></h2>
        <p id="resultMessage"></p>
      </div>
      <div class="bmi-pill">
        <div class="bmi-label">BMI</div>
        <div class="bmi-val" id="bmiVal"></div>
      </div>
    </div>

    <div class="bmi-meter-wrap">
      <div class="meter-track">
        <div class="meter-needle" id="meterNeedle"></div>
      </div>
      <div class="meter-labels">
        <span>Underweight</span>
        <span>Normal</span>
        <span>Overweight</span>
        <span>Obese</span>
      </div>
    </div>

    <div class="result-details">
      <div class="detail-item"><div class="dl">Age</div><div class="dv" id="detAge">—</div></div>
      <div class="detail-item"><div class="dl">Sex</div><div class="dv" id="detSex">—</div></div>
      <div class="detail-item"><div class="dl">Weight</div><div class="dv" id="detWeight">—</div></div>
      <div class="detail-item"><div class="dl">Height</div><div class="dv" id="detHeight">—</div></div>
      <div class="detail-item"><div class="dl">Category</div><div class="dv" id="detCat">—</div></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
